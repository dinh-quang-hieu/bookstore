version: '3.9'

services:
  backend:
    build: ./backend
    container_name: bookstore-backend
    environment:
      - PORT=3001
      - JWT_SECRET=${JWT_SECRET:-dev-secret-change-in-production}
      - NODE_ENV=production
      - DB_PATH=/data/bookstore.db
    volumes:
      - db-data:/data
    ports:
      - "3001:3001"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3001/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build: ./frontend
    container_name: bookstore-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  db-data:
    driver: local
