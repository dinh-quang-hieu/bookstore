name: CI/CD — Build & Deploy to AWS

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  AWS_REGION: ap-southeast-2
  ECR_REGISTRY: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.ap-southeast-2.amazonaws.com
  BACKEND_IMAGE: bookstore-backend
  FRONTEND_IMAGE: bookstore-frontend

jobs:
  # ────────────────────────────────────────────────────────
  # Job 1: Lint & basic checks
  # ────────────────────────────────────────────────────────
  test:
    name: Test & Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: |
            backend/package-lock.json
            frontend/package-lock.json

      - name: Install backend deps
        working-directory: backend
        run: npm ci

      - name: Install frontend deps
        working-directory: frontend
        run: npm ci

      - name: Build frontend (catch compile errors)
        working-directory: frontend
        run: npm run build

  # ────────────────────────────────────────────────────────
  # Job 2: Build & push Docker images to ECR
  # (only on push to main, not on PRs)
  # ────────────────────────────────────────────────────────
  build-and-push:
    name: Build & Push to ECR
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v5

      - name: Validate required GitHub secrets
        env:
          AWS_ACCOUNT_ID: ${{ secrets.AWS_ACCOUNT_ID }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_SSH_KEY: ${{ secrets.EC2_SSH_KEY }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
        run: |
          missing=()
          [ -n "$AWS_ACCOUNT_ID" ] || missing+=("AWS_ACCOUNT_ID")
          [ -n "$AWS_ACCESS_KEY_ID" ] || missing+=("AWS_ACCESS_KEY_ID")
          [ -n "$AWS_SECRET_ACCESS_KEY" ] || missing+=("AWS_SECRET_ACCESS_KEY")
          [ -n "$EC2_HOST" ] || missing+=("EC2_HOST")
          [ -n "$EC2_SSH_KEY" ] || missing+=("EC2_SSH_KEY")
          [ -n "$JWT_SECRET" ] || missing+=("JWT_SECRET")

          if [ ${#missing[@]} -ne 0 ]; then
            echo "::error::Missing required GitHub Actions secrets: ${missing[*]}"
            exit 1
          fi

          echo "All required GitHub Actions secrets are present."

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build & push backend image
        working-directory: backend
        run: |
          IMAGE_URI=${{ env.ECR_REGISTRY }}/${{ env.BACKEND_IMAGE }}:${{ github.sha }}
          docker build -t $IMAGE_URI .
          docker tag $IMAGE_URI ${{ env.ECR_REGISTRY }}/${{ env.BACKEND_IMAGE }}:latest
          docker push $IMAGE_URI
          docker push ${{ env.ECR_REGISTRY }}/${{ env.BACKEND_IMAGE }}:latest
          echo "BACKEND_URI=$IMAGE_URI" >> $GITHUB_ENV

      - name: Build & push frontend image
        working-directory: frontend
        run: |
          IMAGE_URI=${{ env.ECR_REGISTRY }}/${{ env.FRONTEND_IMAGE }}:${{ github.sha }}
          docker build -t $IMAGE_URI .
          docker tag $IMAGE_URI ${{ env.ECR_REGISTRY }}/${{ env.FRONTEND_IMAGE }}:latest
          docker push $IMAGE_URI
          docker push ${{ env.ECR_REGISTRY }}/${{ env.FRONTEND_IMAGE }}:latest
          echo "FRONTEND_URI=$IMAGE_URI" >> $GITHUB_ENV

  # ────────────────────────────────────────────────────────
  # Job 3: Deploy to EC2 via SSH
  # ────────────────────────────────────────────────────────
  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v5

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            # Login to ECR from EC2
            aws ecr get-login-password --region ${{ env.AWS_REGION }} | \
              docker login --username AWS --password-stdin ${{ env.ECR_REGISTRY }}

            # Pull latest images
            docker pull ${{ env.ECR_REGISTRY }}/${{ env.BACKEND_IMAGE }}:latest
            docker pull ${{ env.ECR_REGISTRY }}/${{ env.FRONTEND_IMAGE }}:latest

            # Update docker-compose with new image tags
            cd /opt/bookstore
            cat > docker-compose.prod.yml << 'EOF'
            version: '3.9'
            services:
              backend:
                image: ${{ env.ECR_REGISTRY }}/${{ env.BACKEND_IMAGE }}:${{ github.sha }}
                container_name: bookstore-backend
                environment:
                  - PORT=3001
                  - JWT_SECRET=${{ secrets.JWT_SECRET }}
                  - NODE_ENV=production
                  - DB_PATH=/data/bookstore.db
                volumes:
                  - db-data:/data
                restart: unless-stopped
                healthcheck:
                  test: ["CMD", "wget", "-qO-", "http://localhost:3001/health"]
                  interval: 30s
                  timeout: 10s
                  retries: 3

              frontend:
                image: ${{ env.ECR_REGISTRY }}/${{ env.FRONTEND_IMAGE }}:${{ github.sha }}
                container_name: bookstore-frontend
                ports:
                  - "80:80"
                depends_on:
                  - backend
                restart: unless-stopped

            volumes:
              db-data:
                driver: local
            EOF

            # Zero-downtime rolling restart
            docker compose -f docker-compose.prod.yml up -d --remove-orphans
            docker image prune -f

            echo "Deployment complete: ${{ github.sha }}"
